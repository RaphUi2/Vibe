
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Ultimate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Plus Jakarta Sans', 'sans-serif'],
          },
          colors: {
            blue: {
              400: 'rgb(var(--vibe-accent) / <alpha-value>)',
              500: 'rgb(var(--vibe-accent) / <alpha-value>)',
              600: 'rgb(var(--vibe-accent) / <alpha-value>)',
            }
          }
        }
      },
      plugins: [
        function({ addVariant }) {
          addVariant('landscape', '@media (orientation: landscape) { .auto-rotate & }');
        }
      ]
    }
  </script>
  <style>
    :root {
      --vibe-accent: #1d9bf0; /* X Blue */
      --glass-bg: rgba(0, 0, 0, 0.6);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    body { 
      font-family: 'Inter', 'Plus Jakarta Sans', sans-serif; 
      background-color: #000000; 
      color: #eff3f4; 
      overflow: hidden;
      margin: 0;
    }
    .vibe-logo { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: -0.05em; }
    
    .liquid-glass {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
    }
    
    .liquid-glass-blue {
      background: rgba(29, 155, 240, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid var(--vibe-glow);
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.2);
    }

    .cyber-glow {
      filter: drop-shadow(0 0 10px var(--vibe-accent));
      text-shadow: 0 0 8px var(--vibe-accent);
    }

    @keyframes neural-pulse {
      0% { transform: scale(0.95); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 0.4; }
      100% { transform: scale(1.15); opacity: 0; }
    }
    .animate-neural-pulse {
      animation: neural-pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .logo-glow {
      filter: drop-shadow(0 0 15px rgb(var(--vibe-accent)));
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.2); border-radius: 20px; }

    @keyframes pulse-blue {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    .bg-pulse-blue { animation: pulse-blue 4s infinite ease-in-out; }

    @keyframes boost-glow {
      0% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 0px rgba(59, 130, 246, 0)); }
      50% { transform: scale(1.15); filter: brightness(1.2) drop-shadow(0 0 10px rgba(59, 130, 246, 0.8)); }
      100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 0px rgba(59, 130, 246, 0)); }
    }
    .animate-boost { animation: boost-glow 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

    @keyframes boost-pulse {
      0%, 100% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 2px rgba(59, 130, 246, 0.3)); }
      50% { transform: scale(1.02); opacity: 0.9; filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.6)); }
    }
    .animate-boost-pulse { animation: boost-pulse 3s infinite ease-in-out; }

    /* Themes */
    .theme-default { --vibe-accent: 59 130 246; --vibe-glow: rgba(59, 130, 246, 0.5); --bg-color: #020617; }
    .theme-neon_pink { --vibe-accent: 244 114 182; --vibe-glow: rgba(244, 114, 182, 0.5); --bg-color: #1a0512; }
    .theme-gold { --vibe-accent: 251 191 36; --vibe-glow: rgba(251, 191, 36, 0.5); --bg-color: #1a1602; }
    .theme-cyber_ocean { --vibe-accent: 6 182 212; --vibe-glow: rgba(6, 182, 212, 0.5); --bg-color: #01121a; }
    .theme-ruby { --vibe-accent: 225 29 72; --vibe-glow: rgba(225, 29, 72, 0.5); --bg-color: #1a0308; }
    .theme-emerald { --vibe-accent: 16 185 129; --vibe-glow: rgba(16, 185, 129, 0.5); --bg-color: #011a0e; }
    .theme-neon { --vibe-accent: 255 0 255; --vibe-glow: rgba(255, 0, 255, 0.5); --bg-color: #140014; }
    .theme-matrix { --vibe-accent: 0 255 0; --vibe-glow: rgba(0, 255, 0, 0.5); --bg-color: #001400; }
    .theme-cyber_pink { --vibe-accent: 255 0 127; --vibe-glow: rgba(255, 0, 127, 0.5); --bg-color: #1a000d; }
    .theme-obsidian { --vibe-accent: 161 161 170; --vibe-glow: rgba(255, 255, 255, 0.1); --bg-color: #000000; }
    .theme-royal { --vibe-accent: 139 92 246; --vibe-glow: rgba(139, 92, 246, 0.5); --bg-color: #0f051f; }

    .theme-bg-gradient {
      background: radial-gradient(circle at 0% 0%, var(--vibe-glow) 0%, transparent 40%),
                  radial-gradient(circle at 100% 100%, rgba(30, 64, 175, 0.05) 0%, transparent 40%),
                  var(--bg-color);
      background-attachment: fixed;
    }

    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    @keyframes gradient-x {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .animate-gradient-x {
      background-size: 200% 200%;
      animation: gradient-x 3s ease infinite;
    }

    /* Power Save Mode */
    body.power-save * {
      animation-duration: 0s !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0s !important;
      backdrop-filter: none !important;
      filter: none !important;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
      "react/": "https://esm.sh/react@^19.2.4/",
      "react": "https://esm.sh/react@^19.2.4",
      "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
    }
  }
  </script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="theme-default theme-bg-gradient">
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
